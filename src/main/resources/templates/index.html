<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Evidencias - Taller de Seguridad Informática</title>
    <link rel="stylesheet" th:href="@{/estilo.css}">
</head>
<body>

    <h1>Sistema de Gestión de Evidencias - Prevención de Ingeniería Social</h1>

    <!-- Formulario para guardar una evidencia -->
    <h2>Registrar Nueva Evidencia del Taller</h2>
    <form th:action="@{/guardar}" th:object="${nuevaEvidencia}" method="post">
        <div>
            <label>Título de la Evidencia:</label>
            <input type="text" th:field="*{titulo}" placeholder="Ej: Evaluación de Diagnóstico sobre Phishing" required />
        </div>
        <div>
            <label>Módulo de Seguridad Informática:</label>
            <select th:field="*{moduloSeguridad}" required>
                <option value="" disabled selected>-- Seleccione un módulo --</option>
                <option value="Phishing y Correo Fraudulento">Phishing y Correo Fraudulento</option>
                <option value="Vishing y Llamadas Engañosas">Vishing y Llamadas Engañosas</option>
                <option value="Smishing y Mensajería SMS/WhatsApp">Smishing y Mensajería SMS/WhatsApp</option>
                <option value="Gestión de Contraseñas y Autenticación">Gestión de Contraseñas y Autenticación</option>
                <option value="Ingeniería Social en Redes Sociales">Ingeniería Social en Redes Sociales</option>
            </select>
        </div>
        <div>
            <label>Categoría del Entregable:</label>
            <select th:field="*{categoria}" required>
                <option value="" disabled selected>-- Seleccione tipo de evidencia --</option>
                <option value="Evaluación / Test">Evaluación / Test</option>
                <option value="Material Preventivo / Infografía">Material Preventivo / Infografía</option>
                <option value="Registro de Asistencia">Registro de Asistencia</option>
                <option value="Taller Práctico / Simulación">Taller Práctico / Simulación</option>
                <option value="Encuesta de Satisfacción">Encuesta de Satisfacción</option>
            </select>
        </div>
        <div>
            <label>Descripción:</label>
            <input type="text" th:field="*{descripcion}" placeholder="Ej: Medición inicial de conocimientos en la Provincia de Los Ríos" required />
        </div>
        <div>
            <label>URL del Archivo en la Nube:</label>
            <input type="text" th:field="*{urlArchivo}" placeholder="Ej: https://drive.google.com/..." required />
        </div>
        <button type="submit">Guardar Evidencia</button>
    </form>

    <!-- Tabla para listar las evidencias -->
    <h2>Evidencias Registradas</h2>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Fecha</th>
                <th>Título</th>
                <th>Módulo</th>
                <th>Categoría</th>
                <th>Descripción</th>
                <th>Enlace</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="item : ${evidencias}">
                <td th:text="${item.id}">1</td>
                <td th:text="${item.fechaRegistro}">2026-07-19</td>
                <td th:text="${item.titulo}">Título</td>
                <td th:text="${item.moduloSeguridad}">Módulo</td>
                <td th:text="${item.categoria}">Categoría</td>
                <td th:text="${item.descripcion}">Descripción</td>
                <td>
                    <a th:href="${item.urlArchivo}" target="_blank">Ver Enlace</a>
                </td>
                <td>
                    <a th:href="@{/eliminar/{id}(id=${item.id})}" class="btn-danger" 
                       onclick="return confirm('¿Seguro que deseas eliminar esta evidencia?');">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>

</body>
</html>
